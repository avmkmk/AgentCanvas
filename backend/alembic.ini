# Alembic configuration for AgentCanvas backend.
# sqlalchemy.url is set programmatically in alembic/env.py from app.core.config.settings.
# Do NOT hardcode database credentials here (Coding Standard 10 — no secrets in code).

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone to use for created_at timestamps
timezone = UTC

# Logging format
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
